version: '3.8'

services:
  cloxy:
    build: .
    container_name: cloxy
    ports:
      - "9055:9055"
    volumes:
      - cloxy-data:/data
    environment:
      - CLOXY_PORT=9055
      - CLOXY_DATA_DIR=/data
      - CLOXY_EMBED_MODEL=BAAI/bge-small-en-v1.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9055/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cloxy-data:
